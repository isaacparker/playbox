<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Vocal Synth Looper</title>
<script src="https://cdn.jsdelivr.net/npm/tone@14.7.77/build/Tone.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1"></script>
<script src="https://cdn.jsdelivr.net/npm/meyda@5.6.4/dist/web/meyda.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
button,span,div{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
:root{
/* Surfaces */
--bg:#000;--surface:#0d0d0d;--surface2:#1c1c1c;--surface3:#2a2a2a;--border:#555;
/* Text */
--text:#eee;--text-dim:#888;
/* Accent (cyan) */
--accent:#0ff;--accent-rgb:0,255,255;
--accent-fill-idle:rgba(var(--accent-rgb),0.12);
--accent-fill-active:rgba(var(--accent-rgb),1);
--accent-fill-subtle:rgba(var(--accent-rgb),0.08);
--accent-fill-medium:rgba(var(--accent-rgb),0.5);
/* States */
--record:#f33;--record-rgb:255,50,50;
--success:#0a0;--warning:#fa0;--danger:#f55;--solo:#fa0;
--safe-top:env(safe-area-inset-top,0px);
--safe-bottom:env(safe-area-inset-bottom,0px);
--safe-left:env(safe-area-inset-left,0px);
--safe-right:env(safe-area-inset-right,0px);
}
html,body{
background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
overflow:hidden;height:100%;width:100%;position:fixed;top:0;left:0;
-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;
}
#app{
display:flex;flex-direction:column;height:100%;
padding-top:var(--safe-top);padding-bottom:var(--safe-bottom);
padding-left:var(--safe-left);padding-right:var(--safe-right);
}
/* OVERLAY */
#overlay{
position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);
display:flex;align-items:center;justify-content:center;z-index:1000;
flex-direction:column;gap:16px;
}
#overlay .start-btn{
font-size:24px;color:var(--text);background:none;border:2px solid rgba(255,255,255,0.3);
border-radius:50%;width:300px;height:300px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:transform 0.2s;
}
#overlay .start-btn:active{transform:scale(0.95)}
#overlay p{color:var(--text-dim);font-size:14px;margin-top:8px}
/* TRANSPORT */
#transport{
display:flex;align-items:center;gap:8px;padding:8px 12px;
background:rgba(13,13,13,0.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
border-bottom:1px solid var(--accent);border-left:1px solid var(--accent);border-right:1px solid var(--accent);
border-radius:0 0 12px 12px;
flex-shrink:0;min-height:52px;z-index:2;overflow-x:auto;
}
.transport-btn{
min-width:44px;min-height:44px;background:var(--surface3);color:var(--text);
border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;
padding:6px 10px;display:flex;align-items:center;justify-content:center;gap:4px;
touch-action:none;
}
.transport-btn.active{border-color:var(--accent);color:var(--accent)}
#bpm-display{
font-size:16px;font-weight:700;color:var(--accent);min-width:60px;text-align:center;
font-variant-numeric:tabular-nums;
}
#bpm-slider{width:80px;accent-color:var(--accent);height:44px}
.scene-sel{display:flex;gap:4px}
.scene-btn{
min-width:44px;min-height:44px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;
cursor:pointer;display:flex;align-items:center;justify-content:center;
touch-action:none;
}
.scene-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-fill-subtle)}
#ai-status{
font-size:10px;color:var(--text-dim);margin-left:auto;white-space:nowrap;
}
#room-status{font-size:10px;color:var(--success);display:none;margin-left:4px}
/* CENTER */
#center{
flex:1;display:flex;align-items:center;justify-content:center;
position:relative;min-height:200px;touch-action:none;
}
#layer-nav{
display:flex;align-items:center;gap:6px;padding:4px 12px;
overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0;
justify-content:center;
}
#layer-nav .nav-chip{
font-size:12px;padding:6px 14px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:10px;cursor:pointer;touch-action:none;
white-space:nowrap;flex-shrink:0;transition:all 0.15s;
}
#layer-nav .nav-chip.active{color:var(--accent);border-color:var(--accent);background:var(--accent-fill-subtle)}
#rings-svg{
position:absolute;width:340px;height:340px;
}
#rings-svg .seg{stroke:none;cursor:pointer;transition:fill 0.1s}
#rings-svg .seg.current-step{stroke:var(--text);stroke-width:1.5}
#rings-svg .ring-border{fill:none;stroke-width:0.5;opacity:0.6}
#rings-svg .divider-line{stroke-width:0.5;opacity:0.4}
#pulse-wave{
position:absolute;width:300px;height:300px;border-radius:50%;
border:2px solid var(--accent);opacity:0;pointer-events:none;
transform:scale(1);
}
#pulse-wave.animate{
animation:pulse-expand 0.8s ease-out forwards;
}
@keyframes pulse-expand{
0%{opacity:0.7;transform:scale(1)}
100%{opacity:0;transform:scale(1.8)}
}
#pulse-tick{
position:absolute;width:300px;height:300px;border-radius:50%;
border:1px solid var(--accent);opacity:0;pointer-events:none;
transform:scale(1);
}
#pulse-tick.animate{
animation:pulse-tick-expand 0.4s ease-out forwards;
}
@keyframes pulse-tick-expand{
0%{opacity:0.3;transform:scale(1)}
100%{opacity:0;transform:scale(1.2)}
}
#flow-btn{
position:relative;z-index:10;width:178px;height:178px;border-radius:50%;
background:radial-gradient(circle,#111 0%,#0a0a0a 100%);
border:3px solid transparent;cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-direction:column;
touch-action:none;transition:border-color 0.15s,box-shadow 0.15s,transform 0.15s,background 0.15s;
-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;
}
#flow-btn.recording{
border-color:var(--record);
background:radial-gradient(circle,#2a0505 0%,#1a0000 100%);
box-shadow:0 0 40px rgba(255,50,50,0.5),0 0 80px rgba(255,50,50,0.25),0 0 120px rgba(255,50,50,0.1),inset 0 0 30px rgba(255,50,50,0.15);
transform:scale(1.06);
animation:recording-pulse 1s ease-in-out infinite;
}
@keyframes recording-pulse{
0%{box-shadow:0 0 40px rgba(255,50,50,0.5),0 0 80px rgba(255,50,50,0.25),0 0 120px rgba(255,50,50,0.1),inset 0 0 30px rgba(255,50,50,0.15)}
50%{box-shadow:0 0 60px rgba(255,50,50,0.7),0 0 100px rgba(255,50,50,0.35),0 0 160px rgba(255,50,50,0.15),inset 0 0 40px rgba(255,50,50,0.25)}
100%{box-shadow:0 0 40px rgba(255,50,50,0.5),0 0 80px rgba(255,50,50,0.25),0 0 120px rgba(255,50,50,0.1),inset 0 0 30px rgba(255,50,50,0.15)}
}
#flow-btn.processing{border-color:var(--warning);box-shadow:0 0 30px rgba(255,170,0,0.3)}
#flow-label{font-size:14px;font-weight:700;pointer-events:none;color:var(--text);transition:color 0.15s}
#flow-btn.recording #flow-label{color:var(--record)}
#flow-sub{font-size:10px;color:var(--text-dim);pointer-events:none;margin-top:4px}
#step-indicator{
position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
font-size:11px;color:var(--text-dim);font-variant-numeric:tabular-nums;
}
/* EDIT PANEL */
#edit-panel{
flex:0 1 auto;max-height:45vh;overflow-y:auto;overflow-x:hidden;
background:rgba(13,13,13,0.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
border-top:1px solid var(--accent);border-left:1px solid var(--accent);border-right:1px solid var(--accent);border-radius:12px 12px 0 0;
-webkit-overflow-scrolling:touch;z-index:2;padding:10px 12px;
display:flex;flex-direction:column;gap:8px;
}
#edit-panel:empty::after{
content:'Record to add layers';display:block;text-align:center;
color:var(--text-dim);font-size:13px;padding:24px;
}
#edit-panel .panel-header{display:flex;align-items:center;gap:8px}
.preset-bar{display:none;gap:3px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
.preset-bar.open{display:flex}
.preset-bar .preset-pill{
font-size:9px;padding:3px 8px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:10px;cursor:pointer;touch-action:none;
white-space:nowrap;flex-shrink:0;
}
.preset-bar .preset-pill.active{color:var(--accent);border-color:var(--accent);background:var(--accent-fill-subtle)}
.layer-name{cursor:pointer}
.layer-header{display:flex;align-items:center;gap:8px}
.layer-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-name{font-size:12px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layer-type{
font-size:12px;font-weight:600;color:var(--text);background:var(--surface3);
padding:0 10px;border-radius:6px;border:1px solid var(--border);
min-height:36px;display:flex;align-items:center;
}
.oct-btn{
min-width:32px;min-height:32px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:6px;font-size:14px;cursor:pointer;
display:flex;align-items:center;justify-content:center;touch-action:none;
font-weight:700;line-height:1;
}
.oct-btn:active{border-color:var(--accent);color:var(--accent)}
.layer-btn{
min-width:36px;min-height:36px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;
display:flex;align-items:center;justify-content:center;touch-action:none;
}
.layer-btn.active{color:var(--accent);border-color:var(--accent)}
.layer-btn.solo-active{color:var(--solo);border-color:var(--solo)}
.layer-btn.del{color:var(--danger)}
.step-grid{
display:grid;grid-template-columns:repeat(8,1fr);gap:3px;
}
.step-cell{
aspect-ratio:1;min-width:0;min-height:0;border-radius:4px;
background:color-mix(in srgb, var(--layer-color,var(--accent)) 12%, transparent);
border:1px solid var(--layer-color,var(--accent));cursor:pointer;
touch-action:none;position:relative;transition:background 0.08s;
overflow:hidden;
}
.step-cell.on{background:var(--layer-color,var(--accent))}
.step-cell.ghost{
background:transparent;
border:1px dashed var(--layer-color,var(--accent));
opacity:0.4;
}
.step-cell.ghost:hover,.step-cell.ghost:active{opacity:0.7}
.step-cell.current{box-shadow:inset 0 0 0 2px var(--accent)}
.step-cell.selected{box-shadow:inset 0 0 0 2px var(--accent);outline:2px solid var(--accent)}
.step-note-label{
position:absolute;bottom:1px;left:0;right:0;text-align:center;
font-size:7px;color:rgba(0,0,0,0.6);pointer-events:none;font-weight:700;line-height:1;
}
.note-picker{
display:flex;gap:3px;flex-wrap:wrap;align-items:center;padding:4px 0;
}
.note-picker .note-btn{
font-size:10px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:6px;cursor:pointer;touch-action:none;
width:32px;height:32px;display:flex;align-items:center;justify-content:center;
flex-shrink:0;padding:0;
}
.note-picker .note-btn.active{color:var(--text);border-color:var(--layer-color,var(--accent));background:var(--accent-fill-subtle)}
.scale-badge{font-size:11px;font-weight:600;color:var(--accent);padding:4px 8px;background:var(--accent-fill-subtle);border:1px solid rgba(var(--accent-rgb),0.25);border-radius:6px;white-space:nowrap}
.layer-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.layer-slider-group{display:flex;align-items:center;gap:4px;flex:1;min-width:100px}
.layer-slider-group label{font-size:10px;color:var(--text-dim);min-width:24px}
.layer-slider-group input[type=range]{flex:1;height:36px;accent-color:var(--layer-color,var(--accent))}
.synth-toggle{
font-size:10px;color:var(--text-dim);background:var(--surface3);border:1px solid var(--border);
border-radius:4px;padding:2px 6px;cursor:pointer;min-height:36px;min-width:36px;
display:flex;align-items:center;justify-content:center;touch-action:none;
}
.synth-toggle.open{color:var(--accent);border-color:var(--accent)}
.synth-panel{
display:none;flex-direction:column;gap:6px;padding:0;
}
.synth-panel.open{display:flex}
.synth-group{
background:rgba(28,28,28,0.6);border:1px solid var(--border);border-radius:6px;padding:8px 10px;
display:flex;flex-direction:column;gap:6px;
}
.synth-group-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.osc-chips{display:flex;gap:4px;flex-wrap:wrap}
.osc-chip{
font-size:11px;padding:4px 10px;background:var(--surface3);color:var(--text-dim);
border:1px solid var(--border);border-radius:12px;cursor:pointer;touch-action:none;
min-height:32px;display:flex;align-items:center;
}
.osc-chip.active{color:var(--text);border-color:var(--layer-color,var(--accent));background:var(--accent-fill-subtle)}
.osc-chips.note-chips{gap:3px}
.osc-chips.note-chips .osc-chip{padding:0;width:32px;height:32px;font-size:10px;border-radius:6px;justify-content:center;flex-shrink:0}
.synth-row{display:flex;align-items:center;gap:8px}
.synth-row label{font-size:10px;color:var(--text-dim);min-width:28px}
.synth-row input[type=range]{flex:1;height:36px;accent-color:var(--layer-color,var(--accent))}
.synth-row .val{font-size:10px;color:var(--text-dim);min-width:32px;text-align:right}
/* SCROLLBAR */
#layers-area::-webkit-scrollbar{width:4px}
#layers-area::-webkit-scrollbar-track{background:var(--bg)}
#layers-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* ANIMATIONS */
</style>
</head>
<body>
<div id="overlay">
<button class="start-btn" id="start-btn">Tap to Start</button>
<p>Allow microphone access to begin</p>
</div>
<div id="app">
<div id="transport">
<button class="transport-btn" id="play-btn">&#9654;</button>
<button class="transport-btn" id="stop-btn">&#9632;</button>
<input type="range" id="bpm-slider" min="60" max="200" value="90">
<span id="bpm-display">90</span>
<div class="scene-sel" id="scene-sel" style="display:none"></div>
<button class="transport-btn" id="dup-scene-btn" title="Duplicate Scene" style="display:none">+S</button>
<span id="scale-badge" class="scale-badge" style="display:none;margin-left:auto"></span>
</div>
<div id="layer-nav"></div>
<div id="center">
<div id="pulse-wave"></div>
<div id="pulse-tick"></div>
<svg id="rings-svg" viewBox="0 0 340 340"></svg>
<button id="flow-btn">
<span id="flow-label">Hold to Record</span>
<span id="flow-sub">voice &rarr; synth</span>
</button>
<div id="room-wrap" style="position:absolute;bottom:8px;right:12px;display:flex;align-items:center;gap:4px;z-index:1">
<button id="room-btn" style="font-size:10px;padding:4px 8px;background:var(--surface3);color:var(--text-dim);border:1px solid var(--border);border-radius:8px;cursor:pointer;touch-action:none">Room</button>
<input type="range" id="room-mix-slider" min="0" max="100" value="50" style="display:none;width:50px;height:28px;accent-color:var(--accent)">
</div>
<div id="step-indicator">Step: 1 / 16</div>
</div>
<div id="edit-panel"></div>
</div>
<script>
(function(){
'use strict';

// Early error catcher — if script crashes during load, show it
try {

// ===== PALETTE =====
const LAYER_COLORS = [
  '#0ff','#f0f','#0f0','#fa0','#08f','#f55','#af0','#f0a',
  '#5ff','#ff5','#a5f','#5fa','#fa5','#5af','#af5','#f5a'
];

// ===== STATE =====
let appState = 'INIT'; // INIT, IDLE, RECORDING, PROCESSING, PLAYING
let currentBPM = 90;
let currentStep = 0;
let isPlaying = false;
let mediaStream = null;
let mediaRecorder = null;
let recordedChunks = [];
let audioContext = null;

// Scene management
let scenes = [{ id: 0, name: 'A', layers: [] }];
let currentSceneIdx = 0;
function currentScene() { return scenes[currentSceneIdx]; }

// AI state
let drumRNN = null;
let melodyRNN = null;
let aiLoading = false;
let aiReady = false;

// Room reverb
let roomConvolver = null;
let roomGain = null;
let roomCaptured = false;

// Metronome visual
let metronomePhase = 0;

// Refs
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const playBtn = document.getElementById('play-btn');
const stopBtn = document.getElementById('stop-btn');
const bpmSlider = document.getElementById('bpm-slider');
const bpmDisplay = document.getElementById('bpm-display');
const sceneSel = document.getElementById('scene-sel');
const dupSceneBtn = document.getElementById('dup-scene-btn');
const roomBtn = document.getElementById('room-btn');
const scaleBadge = document.getElementById('scale-badge');
const roomMixSlider = document.getElementById('room-mix-slider');
const ringsSvg = document.getElementById('rings-svg');
const pulseWave = document.getElementById('pulse-wave');
const pulseTick = document.getElementById('pulse-tick');
const editPanel = document.getElementById('edit-panel');
const flowBtn = document.getElementById('flow-btn');
const flowLabel = document.getElementById('flow-label');
const flowSub = document.getElementById('flow-sub');
const stepIndicator = document.getElementById('step-indicator');
const intentRing = null; // removed, replaced by layer-nav

// ===== SOUND INTENT =====
const INTENTS = [
  { id: 'kick',  label: 'Kick',  color: '#0ff', rgb: '0,255,255',     perc: true,  osc: 'brown', attack: 0.001, decay: 0.25, sustain: 0, release: 0, filter: 600,  q: 4,   drive: 0.3, filtEnv: 8000 },
  { id: 'snare', label: 'Snare', color: '#f0f', rgb: '255,0,255',     perc: true,  osc: 'white', attack: 0.001, decay: 0.15, sustain: 0, release: 0, filter: 3000, q: 1.5, drive: 0.2, filtEnv: 6000 },
  { id: 'hat',   label: 'Hat',   color: '#0f0', rgb: '0,255,0',       perc: true,  osc: 'white', attack: 0.001, decay: 0.04, sustain: 0, release: 0, filter: 9000, q: 1,   drive: 0,   filtEnv: 0 },
  { id: 'bass',  label: 'Bass',  color: '#fa0', rgb: '255,170,0',     perc: false, osc: 'square',   attack: 0.005, decay: 0.2,  sustain: 0.7, release: 0.08, filter: 800,  q: 3, drive: 0.25, filtEnv: 3000 },
  { id: 'lead',  label: 'Lead',  color: '#08f', rgb: '0,136,255',     perc: false, osc: 'sawtooth', attack: 0.005, decay: 0.15, sustain: 0.6, release: 0.15, filter: 4000, q: 2, drive: 0.15, filtEnv: 5000 },
  { id: 'pad',   label: 'Pad',   color: '#f5a', rgb: '255,85,170',    perc: false, osc: 'sine',     attack: 0.3,   decay: 0.5,  sustain: 0.8, release: 0.6,  filter: 2000, q: 0.5, drive: 0, filtEnv: 2000 },
];
let selectedIntent = null;

function setGlobalAccent(color, rgb) {
  const root = document.documentElement;
  root.style.setProperty('--accent', color);
  root.style.setProperty('--accent-rgb', rgb);
  root.style.setProperty('--accent-fill-idle', 'rgba(' + rgb + ',0.12)');
  root.style.setProperty('--accent-fill-active', 'rgba(' + rgb + ',1)');
  root.style.setProperty('--accent-fill-subtle', 'rgba(' + rgb + ',0.08)');
  root.style.setProperty('--accent-fill-medium', 'rgba(' + rgb + ',0.5)');
}

// ===== PRESET PATCHES =====
const PRESETS = {
  kick: [
    { name: '808',       osc: 'sine', attack: 0.001, decay: 0.5,  sustain: 0, release: 0.3,  filter: 300,  q: 1,   filtEnv: 2000, drive: 0.10 },
    { name: '909',       osc: 'sine', attack: 0.001, decay: 0.2,  sustain: 0, release: 0.1,  filter: 500,  q: 2,   filtEnv: 3000, drive: 0.30 },
    { name: 'Distorted', osc: 'sine', attack: 0.001, decay: 0.35, sustain: 0, release: 0.15, filter: 400,  q: 1.5, filtEnv: 2500, drive: 0.80 },
    { name: 'Sub',       osc: 'sine', attack: 0.003, decay: 0.7,  sustain: 0, release: 0.4,  filter: 200,  q: 0.5, filtEnv: 1000, drive: 0.05 },
    { name: 'Gabber',    osc: 'sine', attack: 0.001, decay: 0.25, sustain: 0, release: 0.08, filter: 600,  q: 3,   filtEnv: 4000, drive: 0.95 },
  ],
  snare: [
    { name: '808',       osc: 'white', attack: 0.001, decay: 0.25, sustain: 0, release: 0.15, filter: 1800, q: 1.2, filtEnv: 4000, drive: 0.20 },

let recFilledSteps = new Array(16).fill(false);
let recLastStep = -1;
let recAnalyser = null;

// ===== CONCENTRIC RING SYSTEM =====
const CX = 170, CY = 170;
const ACTIVE_BAND = 32; // active ring thickness
const INACTIVE_BAND = 14; // neighbor ring thickness
const RING_GAP = 2;
const RING_CENTER_R = 105; // center radius — allows 5 rings on each side
let activeLayerIdx = 0;
const layerNav = document.getElementById('layer-nav');

function arcPath(cx, cy, rOuter, rInner, startAngle, endAngle) {
  var x1o = cx + Math.cos(startAngle) * rOuter;
  var y1o = cy + Math.sin(startAngle) * rOuter;
  var x2o = cx + Math.cos(endAngle) * rOuter;
  var y2o = cy + Math.sin(endAngle) * rOuter;
  var x1i = cx + Math.cos(endAngle) * rInner;
  var y1i = cy + Math.sin(endAngle) * rInner;
  var x2i = cx + Math.cos(startAngle) * rInner;
  var y2i = cy + Math.sin(startAngle) * rInner;
  return 'M '+x1o+' '+y1o+' A '+rOuter+' '+rOuter+' 0 0 1 '+x2o+' '+y2o+
    ' L '+x1i+' '+y1i+' A '+rInner+' '+rInner+' 0 0 0 '+x2i+' '+y2i+' Z';
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  return parseInt(hex.substring(0,2),16)+','+parseInt(hex.substring(2,4),16)+','+parseInt(hex.substring(4,6),16);
}

function drawRing(ns, rOuter, rInner, layer, color, opacity, isActive) {
  var g = document.createElementNS(ns, 'g');
  g.setAttribute('opacity', opacity);
  var isHex = color && color.charAt(0) === '#';
  var rgb = isHex ? hexToRgb(color) : '0,255,255';
  var fillIdle = 'rgba('+rgb+',0.12)';
  var fillOn = color;
  for (var i = 0; i < 16; i++) {
    var a0 = (i/16)*Math.PI*2 - Math.PI/2;
    var a1 = ((i+1)/16)*Math.PI*2 - Math.PI/2;
    var p = document.createElementNS(ns, 'path');
    p.setAttribute('d', arcPath(CX, CY, rOuter, rInner, a0, a1));
    var on = layer && layer.steps[i];
    var rec = !layer && recFilledSteps[i];
    p.setAttribute('fill', (on||rec) ? fillOn : fillIdle);
    p.setAttribute('class', 'seg');
    p.dataset.step = i;
    if (i === currentStep) p.classList.add('current-step');
    if (isActive && layer) {
      p.addEventListener('pointerdown', handleRingStepTap);
    }
    g.appendChild(p);
  }
  // Borders
  var ci = document.createElementNS(ns,'circle');
  ci.setAttribute('cx',CX); ci.setAttribute('cy',CY); ci.setAttribute('r',rInner);
  ci.setAttribute('class','ring-border'); ci.setAttribute('stroke',color);
  g.appendChild(ci);
  var co = document.createElementNS(ns,'circle');
  co.setAttribute('cx',CX); co.setAttribute('cy',CY); co.setAttribute('r',rOuter);
  co.setAttribute('class','ring-border'); co.setAttribute('stroke',color);
  g.appendChild(co);
  // Dividers
  for (var i = 0; i < 16; i++) {
    var a = (i/16)*Math.PI*2 - Math.PI/2;
    var ln = document.createElementNS(ns,'line');
    ln.setAttribute('x1',CX+Math.cos(a)*rInner); ln.setAttribute('y1',CY+Math.sin(a)*rInner);
    ln.setAttribute('x2',CX+Math.cos(a)*rOuter); ln.setAttribute('y2',CY+Math.sin(a)*rOuter);
    ln.setAttribute('class','divider-line'); ln.setAttribute('stroke',color);
    g.appendChild(ln);
  }
  ringsSvg.appendChild(g);
}

// All 6 slots always exist. Active = thick center. Others stack in/out by slot order.
let autoAdvance = true; // true until user manually navigates

function renderRings() {
  while (ringsSvg.firstChild) ringsSvg.removeChild(ringsSvg.firstChild);
  var ns = 'http://www.w3.org/2000/svg';
  var layers = currentScene().layers;
  var activeSlot = INTENTS.findIndex(function(ii) { return ii.id === selectedIntent; });
  if (activeSlot < 0) activeSlot = 0;

  // Map each intent slot to its layer (or null)
  var slotLayers = new Array(INTENTS.length).fill(null);
  layers.forEach(function(l) {
    var s = INTENTS.findIndex(function(ii) { return ii.id === l.intentId; });
    if (s >= 0) slotLayers[s] = l;
  });

  // Build all 6 ring positions
  // Active slot at RING_CENTER_R with ACTIVE_BAND
  // Slots before → stack inward, slots after → stack outward
  var aInner = RING_CENTER_R - ACTIVE_BAND / 2;
  var aOuter = RING_CENTER_R + ACTIVE_BAND / 2;

  var positions = new Array(INTENTS.length);
  positions[activeSlot] = { rInner: aInner, rOuter: aOuter, isActive: true };

  // Only show immediate neighbor inside and outside (max 1 each)
  // Find nearest recorded layer before active
  for (var s = activeSlot - 1; s >= 0; s--) {
    if (slotLayers[s]) {
      var r = aInner - RING_GAP - INACTIVE_BAND;
      if (r >= 5) positions[s] = { rInner: r, rOuter: r + INACTIVE_BAND, isActive: false };
      break;
    }
  }

  // Find nearest recorded layer after active
  for (var s = activeSlot + 1; s < INTENTS.length; s++) {
    if (slotLayers[s]) {
      var r = aOuter + RING_GAP;
      if (r + INACTIVE_BAND <= 169) positions[s] = { rInner: r, rOuter: r + INACTIVE_BAND, isActive: false };
      break;
    }
  }

  // Draw from outermost to innermost
  for (var s = INTENTS.length - 1; s >= 0; s--) {
    if (!positions[s]) continue;
    var p = positions[s];
    drawRing(ns, p.rOuter, p.rInner, slotLayers[s], INTENTS[s].color, 1, p.isActive);
  }
}

function switchToIntent(intentId, isAuto) {
  var intent = INTENTS.find(function(i) { return i.id === intentId; });
  if (!intent) return;
  if (!isAuto) autoAdvance = false; // user manually navigated
  selectedIntent = intentId;
  setGlobalAccent(intent.color, intent.rgb);
  flowSub.textContent = intent.label;
  // Update activeLayerIdx to match if this intent has a recorded layer
  var layers = currentScene().layers;
  var layerIdx = layers.findIndex(function(l) { return l.intentId === intentId; });
  if (layerIdx >= 0) activeLayerIdx = layerIdx;
  renderRings();
  renderLayerNav();
  renderEditPanel();
}

function handleRingStepTap(e) {
  var step = parseInt(e.target.dataset.step);
  var layer = currentScene().layers.find(function(l) { return l.intentId === selectedIntent; });
  if (!layer) return;
  layer.steps[step] = !layer.steps[step];
  if (layer.steps[step] && layer.notes && !layer.notes[step]) {
    layer.notes[step] = layer.note || 'C4';
  }
  renderRings();
}

// ===== LAYER NAV BAR =====
function renderLayerNav() {
  while (layerNav.firstChild) layerNav.removeChild(layerNav.firstChild);
  var layers = currentScene().layers;
  // Intent chips (for recording new layers)
  INTENTS.forEach(function(intent) {
    var chip = document.createElement('button');
    chip.className = 'nav-chip';
    // Check if any layer uses this intent
    var existingIdx = layers.findIndex(function(l) { return l.intentId === intent.id; });
    var isSelected = selectedIntent === intent.id;
    var hasLayer = existingIdx >= 0;
    if (isSelected) {
      chip.classList.add('active');
      chip.style.color = '#000';
      chip.style.backgroundColor = intent.color;
      chip.style.borderColor = intent.color;
    } else if (hasLayer) {
      chip.style.color = intent.color;
      chip.style.borderColor = intent.color;
    }
    chip.textContent = intent.label;
    chip.addEventListener('click', function() {
      switchToIntent(intent.id, false);
    });
    // Delete button for recorded layers
    if (hasLayer) {
      var del = document.createElement('span');
      del.textContent = ' \u2715';
      del.style.marginLeft = '4px';
      del.style.opacity = '0.6';
      del.addEventListener('click', function(e) {
        e.stopPropagation();
        var layer = layers[existingIdx];
        if (layer.synth) { try { layer.synth.dispose(); } catch(ex){} }
        if (layer.synth2) { try { layer.synth2.dispose(); } catch(ex){} }
        if (layer.subOsc) { try { layer.subOsc.dispose(); } catch(ex){} }
        if (layer.drive) { try { layer.drive.dispose(); } catch(ex){} }
        if (layer.filter) { try { layer.filter.dispose(); } catch(ex){} }
        layers.splice(existingIdx, 1);
        renderRings(); renderEditPanel(); renderLayerNav();
      });
      chip.appendChild(del);
    }
    layerNav.appendChild(chip);
  });
}

// ===== AUDIO INIT =====
async function initAudio() {
  try {
    // Resume AudioContext explicitly for mobile browsers
    if (Tone.context.state !== 'running') {
      await Tone.context.resume();
    }
    await Tone.start();
    Tone.Destination.volume.value = -12; // prevent blasting at full volume
    audioContext = Tone.context.rawContext;
    Tone.Transport.bpm.value = currentBPM;
    Tone.Transport.loop = true;
    Tone.Transport.loopStart = 0;
    Tone.Transport.loopEnd = '1m';
    // Set up 16th note schedule
    Tone.Transport.scheduleRepeat((time) => {
      const step = Math.round(Tone.Transport.position.split(':').reduce((acc, v, i) => {
        if (i === 0) return acc + parseInt(v) * 16;
        if (i === 1) return acc + parseInt(v) * 4;
        return acc + Math.round(parseFloat(v));
      }, 0)) % 16;
      currentStep = step;
      // Play active synths
      const scene = currentScene();
      const hasSolo = scene.layers.some(l => l.solo);
      scene.layers.forEach(l => {
        if (l.muted) return;
        if (hasSolo && !l.solo) return;
        if (l.steps[step] && l.synth) {
          try {
            // Filter envelope sweep
            if (l.filter && l.filtEnvAmount > 0) {
              const peak = l.filterCutoff + l.filtEnvAmount;
              l.filter.frequency.cancelScheduledValues(time);
              l.filter.frequency.setValueAtTime(peak, time);
              l.filter.frequency.exponentialRampToValueAtTime(
                Math.max(20, l.filterCutoff), time + (l.envDecay || 0.1)
              );
            }
            const dur = (l.durations && l.durations[step]) || '16n';
            if (l.intentId === 'kick') {
              // MembraneSynth takes a note (pitch) — C1 is a deep kick
              l.synth.triggerAttackRelease('C1', dur, time);
            } else if (l.isPercussive) {
              l.synth.triggerAttackRelease(dur, time);
            } else {
              // Per-step note, with octave offset applied
              let pn;
              if (l.notes && l.notes[step]) {
                const n = l.notes[step];
                const name = n.replace(/\d+$/, '');
                const oct = parseInt(n.match(/\d+$/)[0]) + (l.octave || 0);
                pn = name + Math.max(0, Math.min(8, oct));
              } else {
                pn = getPlaybackNote(l) || 'C4';
              }
              l.synth.triggerAttackRelease(pn, dur, time);
              if (l.synth2) l.synth2.triggerAttackRelease(pn, dur, time);
              if (l.subOsc) {
                const subNote = Tone.Frequency(pn).transpose(-12).toNote();
                l.subOsc.triggerAttackRelease(subNote, dur, time);
              }
            }
          } catch(e) {}
        }
      });
    }, '16n');
    // Request mic
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) {
      console.warn('Mic denied:', e);
    }
    // Setup room convolver
    roomConvolver = Tone.context.createConvolver();
    roomGain = Tone.context.createGain();
    roomGain.gain.value = 0.5;
    roomConvolver.connect(roomGain);
    roomGain.connect(Tone.context.rawContext.destination);
    overlay.style.display = 'none';
    setState('IDLE');
    startTransport();
    loadAI();
  } catch(e) {
    console.error('initAudio failed:', e);
    overlay.querySelector('p').textContent = 'Error: ' + e.message + ' — tap again';
  }
}

function startTransport() {

}

async function loadAI() {
  if (typeof mm === 'undefined') return;
  aiLoading = true;
  try {
    drumRNN = new mm.MusicRNN('https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/drum_kit_rnn');
    await drumRNN.initialize();
  } catch(e) {
    console.warn('DrumRNN failed:', e);
    drumRNN = null;
  }
  try {
    melodyRNN = new mm.MusicRNN('https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/melody_rnn');
    await melodyRNN.initialize();
  } catch(e) {
    console.warn('MelodyRNN failed:', e);
    melodyRNN = null;
  }
  aiLoading = false;
  aiReady = (drumRNN !== null || melodyRNN !== null);
}

function setState(s) {
  appState = s;
  flowBtn.classList.remove('recording', 'processing');
  switch(s) {
    case 'IDLE':
      flowLabel.textContent = 'Hold to Record';
      flowSub.textContent = 'voice \u2192 synth';
      break;
    case 'RECORDING':
      flowBtn.classList.add('recording');
      flowLabel.textContent = 'Recording...';
      flowSub.textContent = 'release to process';
      break;
    case 'PROCESSING':
      flowBtn.classList.add('processing');
      flowLabel.textContent = 'Analyzing...';
      flowSub.textContent = '';
      break;
    case 'PLAYING':
      flowLabel.textContent = 'Hold to Record';
      flowSub.textContent = currentScene().layers.length + ' layer(s)';
      break;
  }
}

function clearRecRing() {
  recFilledSteps = new Array(16).fill(false);
  recLastStep = -1;
  renderRings();
}

function startRecording() {
  setState('RECORDING');
  recordedChunks = [];
  clearRecRing();

  // Set up real-time mic analyser for ring feedback
  if (mediaStream && audioContext) {
    try {
      const src = audioContext.createMediaStreamSource(mediaStream);
      recAnalyser = audioContext.createAnalyser();
      recAnalyser.fftSize = 256;
      src.connect(recAnalyser);
    } catch(e) { recAnalyser = null; }
  }
  // Mute all playback while recording (prevents speaker bleed into mic)
  currentScene().layers.forEach(l => {
    if (l.synth) { try { l.synth.volume.value = -Infinity; } catch(e){} }
    if (l.synth2) { try { l.synth2.volume.value = -Infinity; } catch(e){} }
    if (l.subOsc) { try { l.subOsc.volume.value = -Infinity; } catch(e){} }
  });
  if (roomGain) roomGain.gain.value = 0;
  try {
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'audio/webm;codecs=opus' });
  } catch(e) {
    try {
      mediaRecorder = new MediaRecorder(mediaStream);
    } catch(e2) {
      setState('IDLE');
      return;
    }
  }
  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };
  mediaRecorder.onstop = () => {
    processRecording();
  };
  recordingStartTime = performance.now();
  mediaRecorder.start(100);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  // Restore all volumes
  currentScene().layers.forEach(l => {
    if (l.synth) { try { l.synth.volume.value = Tone.gainToDb(l.volume); } catch(e){} }
    if (l.synth2) { try { l.synth2.volume.value = -6; } catch(e){} }
    if (l.subOsc) { try { l.subOsc.volume.value = -10; } catch(e){} }
  });
  if (roomGain) roomGain.gain.value = parseInt(roomMixSlider.value) / 100;
  setState('PROCESSING');
}

// ===== AUDIO PROCESSING =====
async function processRecording() {
  if (recordedChunks.length === 0) { setState(currentScene().layers.length > 0 ? 'PLAYING' : 'IDLE'); return; }
  const blob = new Blob(recordedChunks, { type: recordedChunks[0].type || 'audio/webm' });
  let audioBuffer;
  try {
    const arrayBuf = await blob.arrayBuffer();
    audioBuffer = await audioContext.decodeAudioData(arrayBuf);
  } catch(e) {
    console.error('Decode failed:', e);
    setState(currentScene().layers.length > 0 ? 'PLAYING' : 'IDLE');
    return;
  }
  const channelData = audioBuffer.getChannelData(0);
  const sampleRate = audioBuffer.sampleRate;

  // 1. Get intent first so analysis can use it
  const intent = getSelectedIntent();
  const intentId = intent ? intent.id : null;

  // 2. Per-step analysis: onsets, pitch per step, durations
  const analysis = analyzeStepAudio(channelData, sampleRate, intentId);

  // 3. Determine synth character
  const spectrum = analyzeSpectrum(channelData, sampleRate);
  const brightness = spectrum.brightness;

  // Pick the best preset based on intent or auto-detect
  let presetCategory, isPercussive, layerName, activePreset;

  if (intent) {
    presetCategory = intent.id;
    isPercussive = intent.perc;
    layerName = intent.label;
  } else {
    // Auto-detect: pick category from spectral analysis
    isPercussive = spectrum.isPercussive;
    if (isPercussive) {
      presetCategory = brightness > 0.6 ? 'hat' : brightness > 0.3 ? 'snare' : 'kick';
    } else {
      presetCategory = brightness > 0.5 ? 'lead' : brightness > 0.2 ? 'bass' : 'pad';
    }
    layerName = analysis.fallbackNote;
  }

  // Use first preset in category as starting point
  const preset = PRESETS[presetCategory][0];
  activePreset = preset.name;
  const oscType = preset.osc;
  const filterCutoff = preset.filter;
  const filterQ = preset.q;
  const envAttack = preset.attack;
  const envDecay = preset.decay;
  const envSustain = preset.sustain;
  const envRelease = preset.release;
  const driveAmount = preset.drive;
  const filtEnvAmount = preset.filtEnv;

  // 3. Create layer with per-step notes and durations
  const layerIdx = currentScene().layers.length;
  const intentObj = INTENTS.find(i => i.id === intentId);
  const color = intentObj ? intentObj.color : LAYER_COLORS[layerIdx % LAYER_COLORS.length];
  const layer = {
    id: Date.now(),
    name: layerName,
    intentId: intentId,
    isPercussive,
    note: analysis.fallbackNote,
    notes: analysis.notes,
    durations: analysis.durations,
    steps: analysis.steps,
    ghostSteps: new Array(16).fill(false),
    color,
    volume: 0.8,
    filterCutoff,
    filterQ: filterQ || 1,
    filtEnvAmount: filtEnvAmount || 0,
    muted: false,
    solo: false,
    oscType,
    envAttack,
    envDecay,
    envSustain,
    envRelease,
    driveAmount: driveAmount || 0,
    activePreset: activePreset || null,
    octave: 0,
    synthOpen: false,
    synth: null,
    synth2: null,
    subOsc: null,
    drive: null,
    filter: null
  };

  createSynthForLayer(layer);
  currentScene().layers.push(layer);

  // Set new layer as active in ring view
  var newIdx = currentScene().layers.length - 1;
  activeLayerIdx = newIdx;

  // Update global scale from all layers
  updateGlobalScale();
  scaleBadge.style.display = 'inline';
  scaleBadge.textContent = globalScale ? getScaleLabel() : 'Chromatic';
  // Quantize this layer's notes to scale
  if (globalScale && layer.notes && !layer.isPercussive) {
    for (let s = 0; s < 16; s++) {
      if (layer.notes[s]) layer.notes[s] = snapToScale(layer.notes[s]);
    }
  }

  // 5. AI suggestion
  requestAISuggestion(layer);

  if (!isPlaying) startTransport();
  setState('PLAYING');

  // Auto-advance to next unrecorded intent if user hasn't manually navigated
  if (autoAdvance) {
    var allLayers = currentScene().layers;
    var usedIntents = new Set(allLayers.map(function(l) { return l.intentId; }).filter(Boolean));
    var nextIntent = INTENTS.find(function(ii) { return !usedIntents.has(ii.id); });
    if (nextIntent) {
      switchToIntent(nextIntent.id, true);
    } else {
      if (intentObj) switchToIntent(intentObj.id, true);
    }
  } else {
    // User navigated manually — just refresh current view
    renderRings(); renderEditPanel(); renderLayerNav();
  }
  // Re-enable auto-advance when user records on an unrecorded slot
  autoAdvance = true;
}

// ===== FIND LOUDEST REGION =====
function findLoudestRegion(data, windowSize) {
  let maxRms = 0, bestStart = 0;
  const step = Math.floor(windowSize / 4);
  for (let i = 0; i + windowSize <= data.length; i += step) {
    let sum = 0;
    for (let j = i; j < i + windowSize; j++) sum += data[j] * data[j];
    const rms = sum / windowSize;
    if (rms > maxRms) { maxRms = rms; bestStart = i; }
  }
  return bestStart;
}

// ===== SPECTRAL ANALYSIS =====
function analyzeSpectrum(data, sr) {
  const fftSize = 2048;
  // Analyze the loudest part, not the start
  const start = findLoudestRegion(data, fftSize);
  const samples = data.slice(start, start + fftSize);
  const n = fftSize;
  const mags = new Float32Array(n / 2);
  for (let k = 0; k < n / 2; k++) {
    let re = 0, im = 0;
    for (let t = 0; t < n && t < samples.length; t++) {
      const angle = (2 * Math.PI * k * t) / n;
      re += samples[t] * Math.cos(angle);
      im -= samples[t] * Math.sin(angle);
    }
    mags[k] = Math.sqrt(re * re + im * im) + 1e-10;
  }
  // Spectral flatness
  let logSum = 0, linSum = 0;
  for (let i = 1; i < mags.length; i++) {
    logSum += Math.log(mags[i]);
    linSum += mags[i];
  }
  const n2 = mags.length - 1;
  const geoMean = Math.exp(logSum / n2);
  const ariMean = linSum / n2;
  const flatness = geoMean / ariMean;
  // Spectral centroid (brightness 0-1)
  let weightedSum = 0, totalMag = 0;
  for (let i = 1; i < mags.length; i++) {
    weightedSum += i * mags[i];
    totalMag += mags[i];
  }
  const centroidBin = weightedSum / (totalMag || 1);
  const brightness = Math.min(1, centroidBin / (n / 4));
  return { isPercussive: flatness > 0.3, brightness };
}

// ===== PITCH DETECTION (YIN with confidence) =====
function yinPitch(buf, sr) {
  const halfSize = Math.floor(buf.length / 2);
  if (halfSize < 2) return { freq: 0, confidence: 0 };
  const diff = new Float32Array(halfSize);
  for (let tau = 0; tau < halfSize; tau++) {
    let sum = 0;
    for (let i = 0; i < halfSize; i++) {
      const d = buf[i] - buf[i + tau];
      sum += d * d;
    }
    diff[tau] = sum;
  }
  diff[0] = 1;
  let runningSum = 0;
  for (let tau = 1; tau < halfSize; tau++) {
    runningSum += diff[tau];
    diff[tau] = diff[tau] * tau / runningSum;
  }
  const minP = Math.floor(sr / 1000);
  const maxP = Math.floor(sr / 60);
  let bestTau = -1, bestVal = 1;
  for (let tau = minP; tau < Math.min(halfSize, maxP); tau++) {
    if (diff[tau] < bestVal) { bestVal = diff[tau]; bestTau = tau; }
    if (diff[tau] < 0.3 && bestTau > 0) break;
  }
  if (bestTau < 0 || bestVal > 0.6) return { freq: 0, confidence: 0 };
  return { freq: sr / bestTau, confidence: 1 - bestVal };
}

// ===== QUANTIZE TO CHROMATIC NOTE =====
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// ===== SCALE SYSTEM =====
const SCALES = {
  major:     [0,2,4,5,7,9,11],
  minor:     [0,2,3,5,7,8,10],
  dorian:    [0,2,3,5,7,9,10],
  mixolydian:[0,2,4,5,7,9,10],
  pentatonic:[0,2,4,7,9],
  minorPent: [0,3,5,7,10],
  blues:     [0,3,5,6,7,10],
};
let globalScale = null; // {root: 0-11, type: 'major', notes: [0,2,4...]}

function detectScale(allNotes) {
  // Collect pitch classes from all note strings
  const pitchCounts = new Array(12).fill(0);
  allNotes.forEach(n => {
    if (!n) return;
    const name = n.replace(/\d+$/, '');
    const idx = NOTE_NAMES.indexOf(name);
    if (idx >= 0) pitchCounts[idx]++;
  });
  // Score each root + scale combination
  let bestScore = 0, bestRoot = 0, bestType = 'minor';
  Object.entries(SCALES).forEach(([type, intervals]) => {
    for (let root = 0; root < 12; root++) {
      let score = 0;
      intervals.forEach(i => { score += pitchCounts[(root + i) % 12]; });
      if (score > bestScore) { bestScore = score; bestRoot = root; bestType = type; }
    }
  });
  if (bestScore === 0) return null;
  const scaleNotes = SCALES[bestType].map(i => (bestRoot + i) % 12);
  return { root: bestRoot, type: bestType, notes: scaleNotes };
}

function getScaleNoteNames(scale, octave) {
  if (!scale) return NOTE_NAMES.map(n => n + octave);
  return scale.notes.map(pc => NOTE_NAMES[pc] + octave);
}

function updateGlobalScale() {
  if (globalScale) return; // Once locked, stay locked
  const allNotes = [];
  currentScene().layers.forEach(l => {
    if (l.notes) l.notes.forEach(n => { if (n) allNotes.push(n); });
  });
  if (allNotes.length >= 3) {
    globalScale = detectScale(allNotes);
  }
}

function getScaleLabel() {
  if (!globalScale) return '';
  return NOTE_NAMES[globalScale.root] + ' ' + globalScale.type;
}

function snapToScale(noteStr) {
  if (!globalScale || !noteStr) return noteStr;
  const name = noteStr.replace(/\d+$/, '');
  const oct = parseInt(noteStr.match(/\d+$/)[0]);
  const pc = NOTE_NAMES.indexOf(name);
  if (pc < 0) return noteStr;
  if (globalScale.notes.includes(pc)) return noteStr; // already in scale
  // Find nearest scale note
  let minDist = 12, closest = pc;
  globalScale.notes.forEach(spc => {
    const d = Math.min(Math.abs(pc - spc), 12 - Math.abs(pc - spc));
    if (d < minDist) { minDist = d; closest = spc; }
  });
  return NOTE_NAMES[closest] + oct;
}
function freqToMidi(freq) {
  if (freq <= 0) return 0;
  return Math.round(12 * Math.log2(freq / 440) + 69);
}
function midiToNote(midi) {
  const clamped = Math.max(24, Math.min(96, midi));
  return NOTE_NAMES[clamped % 12] + (Math.floor(clamped / 12) - 1);
}
function quantizeToNote(freq) {
  if (freq <= 0) return 'A3';
  return midiToNote(freqToMidi(freq));
}

// ===== PER-STEP AUDIO ANALYSIS =====
// Detects onsets, pitch per step, and duration — the core of voice-to-sequence
function analyzeStepAudio(data, sr, intentId) {
  const barDuration = (60 / currentBPM) * 4;
  const stepDuration = barDuration / 16;
  const steps = new Array(16).fill(false);
  const notes = new Array(16).fill(null);
  const durations = new Array(16).fill('16n');

  // Intent-aware settings: threshold, min gap, max steps
  const settings = {
    kick:  { threshold: 0.5,  minGap: 3, maxSteps: 4 },
    snare: { threshold: 0.4,  minGap: 2, maxSteps: 6 },
    hat:   { threshold: 0.25, minGap: 1, maxSteps: 16 },
    bass:  { threshold: 0.3,  minGap: 1, maxSteps: 10 },
    lead:  { threshold: 0.3,  minGap: 1, maxSteps: 12 },
    pad:   { threshold: 0.55, minGap: 4, maxSteps: 4 },
  };
  const s_cfg = settings[intentId] || { threshold: 0.3, minGap: 1, maxSteps: 12 };
  const energyThreshold = s_cfg.threshold;
  const minGap = s_cfg.minGap;
  const maxSteps = s_cfg.maxSteps;
  const isPerc = intentId === 'kick' || intentId === 'snare' || intentId === 'hat';
  const isPad = intentId === 'pad';

  // 1. Compute RMS energy per step
  const stepEnergies = [];
  for (let s = 0; s < 16; s++) {
    const startSamp = Math.floor((s * stepDuration) * sr);
    const endSamp = Math.floor(((s + 1) * stepDuration) * sr);
    if (startSamp >= data.length) { stepEnergies.push(0); continue; }
    let sum = 0;
    const end = Math.min(endSamp, data.length);
    for (let i = startSamp; i < end; i++) sum += data[i] * data[i];
    stepEnergies.push(Math.sqrt(sum / Math.max(end - startSamp, 1)));
  }

  // 2. Find onset steps using energy derivative (transient detection)
  const maxEnergy = Math.max(...stepEnergies);
  const threshold = maxEnergy * energyThreshold;
  const onsetSteps = [];
  let lastOnset = -minGap;

  for (let s = 0; s < 16; s++) {
    if (s * stepDuration * sr >= data.length) continue;
    if (stepEnergies[s] < threshold) continue;
    // Check for energy jump (onset) or first strong step
    const prev = s > 0 ? stepEnergies[s - 1] : 0;
    const isOnset = (prev < threshold * 0.5) || (s === 0) || (stepEnergies[s] / Math.max(prev, 0.0001) > 2);
    if (isOnset && (s - lastOnset) >= minGap) {
      onsetSteps.push(s);
      steps[s] = true;
      lastOnset = s;
    }
  }

  // Ensure at least one step
  if (onsetSteps.length === 0) {
    const maxIdx = stepEnergies.indexOf(maxEnergy);
    if (maxIdx >= 0) { steps[maxIdx] = true; onsetSteps.push(maxIdx); }
  }

  // Cap to maxSteps — keep the loudest ones
  if (onsetSteps.length > maxSteps) {
    const sorted = onsetSteps.slice().sort((a, b) => stepEnergies[b] - stepEnergies[a]);
    const keep = new Set(sorted.slice(0, maxSteps));
    for (let s = 0; s < 16; s++) {
      if (steps[s] && !keep.has(s)) steps[s] = false;
    }
    onsetSteps.length = 0;
    for (let s = 0; s < 16; s++) if (steps[s]) onsetSteps.push(s);
  }

  // 4. Pitch-detect each onset from the sustained portion after the attack
  const pitchResults = []; // {step, freq, confidence, midi}
  const yinWindow = Math.min(Math.floor(stepDuration * sr), 4096);
  onsetSteps.forEach(s => {
    // Skip the first 10% of the step (attack transient), analyze the rest
    const attackSkip = Math.floor(stepDuration * sr * 0.1);
    const startSamp = Math.floor(s * stepDuration * sr) + attackSkip;
    const endSamp = Math.min(startSamp + yinWindow, data.length);
    if (endSamp - startSamp < 256) {
      pitchResults.push({ step: s, freq: 0, confidence: 0, midi: 0 });
      return;
    }
    const slice = data.slice(startSamp, endSamp);
    const result = yinPitch(slice, sr);
    const midi = result.freq > 0 ? freqToMidi(result.freq) : 0;
    pitchResults.push({ step: s, freq: result.freq, confidence: result.confidence, midi });
  });

  // 5. Find key center from high-confidence detections
  const confidentPitches = pitchResults.filter(p => p.confidence > 0.5 && p.midi > 0);
  let fallbackMidi = 57; // A3
  if (confidentPitches.length > 0) {
    // Most common pitch class
    const pitchCounts = {};
    confidentPitches.forEach(p => {
      const pc = p.midi % 12;
      pitchCounts[pc] = (pitchCounts[pc] || 0) + p.confidence;
    });
    // Median midi for fallback octave
    const sortedMidi = confidentPitches.map(p => p.midi).sort((a, b) => a - b);
    fallbackMidi = sortedMidi[Math.floor(sortedMidi.length / 2)];
  }

  // 6. Assign notes — confident detections keep their pitch, others get normalized
  pitchResults.forEach(p => {
    if (p.confidence > 0.4 && p.midi > 0) {
      notes[p.step] = midiToNote(p.midi);
    } else {
      notes[p.step] = midiToNote(fallbackMidi);
    }
  });

  // 7. Compute durations — intent-aware
  for (let i = 0; i < onsetSteps.length; i++) {
    const s = onsetSteps[i];
    if (isPerc) {
      durations[s] = '16n'; // percussive = always short
    } else if (isPad) {
      durations[s] = '4n'; // pads ring out but don't stack
    } else {
      // Bass/lead — use energy to determine length
      const nextOnset = i + 1 < onsetSteps.length ? onsetSteps[i + 1] : 16;
      const gap = nextOnset - s;
      if (gap >= 4) durations[s] = '4n';
      else if (gap >= 2) durations[s] = '8n';
      else durations[s] = '16n';
    }
  }

  // Fill notes for non-onset active steps (sustained from previous)
  let lastNote = null;
  for (let s = 0; s < 16; s++) {
    if (steps[s] && notes[s]) lastNote = notes[s];
    else if (steps[s] && !notes[s] && lastNote) notes[s] = lastNote;
  }

  return { steps, notes, durations, onsetSteps, fallbackNote: midiToNote(fallbackMidi) };
}

// ===== PITCH HELPERS =====
function getPlaybackNote(layer) {
  if (layer.isPercussive) return null;
  const base = layer.note || 'C4';
  const name = base.replace(/\d+$/, '');
  const oct = parseInt(base.match(/\d+$/)[0]) + (layer.octave || 0);
  return name + Math.max(0, Math.min(8, oct));
}

// ===== DRIVE CURVE =====
function makeDriveCurve(amount) {
  const k = amount * 50;
  const samples = 256;
  const curve = new Float32Array(samples);
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    curve[i] = k > 0 ? ((1 + k) * x) / (1 + k * Math.abs(x)) : x;
  }
  return curve;
}

// ===== SYNTH CREATION =====
function createSynthForLayer(layer) {
  // Clean up old nodes
  if (layer.synth) { try { layer.synth.dispose(); } catch(e){} }
  if (layer.synth2) { try { layer.synth2.dispose(); } catch(e){} }
  if (layer.subOsc) { try { layer.subOsc.dispose(); } catch(e){} }
  if (layer.filter) { try { layer.filter.dispose(); } catch(e){} }
  if (layer.drive) { try { layer.drive.dispose(); } catch(e){} }
  layer.synth2 = null;
  layer.subOsc = null;

  // Drive (waveshaper distortion)
  layer.drive = new Tone.WaveShaper(makeDriveCurve(layer.driveAmount || 0));

  // Filter
  layer.filter = new Tone.Filter({
    frequency: layer.filterCutoff,
    Q: layer.filterQ || 1,
    type: 'lowpass',
    rolloff: -24
  });

  // Chain: drive -> filter -> output
  layer.drive.connect(layer.filter);
  if (roomCaptured && roomConvolver) {
    layer.filter.connect(roomConvolver);
  }
  layer.filter.toDestination();

  if (layer.intentId === 'kick') {
    // Kick uses MembraneSynth — pitched sine with fast pitch decay
    layer.synth = new Tone.MembraneSynth({
      pitchDecay: layer.envDecay * 0.5 || 0.05,
      octaves: 6,
      oscillator: { type: 'sine' },
      envelope: { attack: layer.envAttack || 0.001, decay: layer.envDecay || 0.3, sustain: 0, release: layer.envRelease || 0.1 }
    });
    layer.synth.connect(layer.drive);
  } else if (layer.isPercussive) {
    layer.synth = new Tone.NoiseSynth({
      noise: { type: layer.oscType || 'white' },
      envelope: { attack: layer.envAttack, decay: layer.envDecay, sustain: layer.envSustain }
    });
    layer.synth.connect(layer.drive);
  } else {
    // Main oscillator
    layer.synth = new Tone.Synth({
      oscillator: { type: layer.oscType || 'sawtooth' },
      envelope: { attack: layer.envAttack, decay: layer.envDecay, sustain: layer.envSustain, release: layer.envRelease }
    });
    layer.synth.connect(layer.drive);

    // Detuned second oscillator for thickness
    layer.synth2 = new Tone.Synth({
      oscillator: { type: layer.oscType || 'sawtooth', detune: 12 },
      envelope: { attack: layer.envAttack, decay: layer.envDecay, sustain: layer.envSustain, release: layer.envRelease }
    });
    layer.synth2.connect(layer.drive);
    layer.synth2.volume.value = -6;

    // Sub oscillator (one octave down, sine) for body
    layer.subOsc = new Tone.Synth({
      oscillator: { type: 'sine' },
      envelope: { attack: layer.envAttack, decay: layer.envDecay * 1.5, sustain: layer.envSustain, release: layer.envRelease * 1.2 }
    });
    layer.subOsc.connect(layer.drive);
    layer.subOsc.volume.value = -10;
  }

  layer.synth.volume.value = Tone.gainToDb(layer.volume);
}

// Update synth params without full rebuild
function updateSynthParams(layer) {
  if (!layer.synth) return;
  try {
    if (layer.intentId === 'kick') {
      layer.synth.set({
        pitchDecay: (layer.envDecay || 0.1) * 0.5,
        envelope: { attack: layer.envAttack, decay: layer.envDecay, sustain: 0, release: layer.envRelease || 0.1 }
      });
    } else if (layer.isPercussive) {
      layer.synth.set({
        noise: { type: layer.oscType || 'white' },
        envelope: { attack: layer.envAttack, decay: layer.envDecay, sustain: layer.envSustain }
      });
    } else {
      const envObj = { attack: layer.envAttack, decay: layer.envDecay, sustain: layer.envSustain, release: layer.envRelease };
      layer.synth.set({ oscillator: { type: layer.oscType || 'sawtooth' }, envelope: envObj });
      if (layer.synth2) layer.synth2.set({ oscillator: { type: layer.oscType || 'sawtooth', detune: 12 }, envelope: envObj });
      if (layer.subOsc) layer.subOsc.set({ envelope: { attack: layer.envAttack, decay: layer.envDecay * 1.5, sustain: layer.envSustain, release: layer.envRelease * 1.2 } });
    }
    if (layer.drive) layer.drive.curve = makeDriveCurve(layer.driveAmount || 0);
  } catch(e) {
    createSynthForLayer(layer);
  }
}

// ===== AI SUGGESTIONS =====
async function requestAISuggestion(layer) {
  if (!aiReady) return;

  try {
    if (layer.isPercussive && drumRNN) {
      await suggestDrumPattern(layer);
    } else if (!layer.isPercussive && melodyRNN) {
      await suggestMelodyPattern(layer);
    }
    renderRings(); renderEditPanel();
  } catch(e) {
    console.warn('AI suggestion failed:', e);
  }
}

async function suggestDrumPattern(layer) {
  // Convert steps to NoteSequence for DrumRNN
  const stepsPerQuarter = 4;
  const notes = [];
  layer.steps.forEach((on, i) => {
    if (on) {
      // Kick drum = MIDI 36
      notes.push({
        pitch: 36,
        quantizedStartStep: i,
        quantizedEndStep: i + 1,
        isDrum: true
      });
    }
  });

  if (notes.length === 0) return;

  const seq = {
    notes: notes,
    quantizationInfo: { stepsPerQuarter },
    totalQuantizedSteps: 16
  };

  try {
    const result = await drumRNN.continueSequence(seq, 16, 1.0);
    if (result && result.notes) {
      result.notes.forEach(n => {
        const step = n.quantizedStartStep % 16;
        if (!layer.steps[step]) {
          layer.ghostSteps[step] = true;
        }
      });
    }
  } catch(e) {
    console.warn('DrumRNN continuation failed:', e);
  }
}

async function suggestMelodyPattern(layer) {
  // Convert to melody NoteSequence
  const stepsPerQuarter = 4;
  const midiNote = Tone.Frequency(layer.note).toMidi();
  const notes = [];
  layer.steps.forEach((on, i) => {
    if (on) {
      notes.push({
        pitch: midiNote,
        quantizedStartStep: i,
        quantizedEndStep: i + 1
      });
    }
  });

  if (notes.length === 0) return;

  const seq = {
    notes: notes,
    quantizationInfo: { stepsPerQuarter },
    totalQuantizedSteps: 16
  };

  try {
    const result = await melodyRNN.continueSequence(seq, 16, 1.1);
    if (result && result.notes) {
      result.notes.forEach(n => {
        const step = n.quantizedStartStep % 16;
        if (!layer.steps[step]) {
          layer.ghostSteps[step] = true;
        }
      });
    }
  } catch(e) {
    console.warn('MelodyRNN continuation failed:', e);
  }
}

// ===== ROOM REVERB CAPTURE =====
roomBtn.addEventListener('pointerdown', captureRoom);
roomMixSlider.addEventListener('input', () => {
  if (roomGain) roomGain.gain.value = parseInt(roomMixSlider.value) / 100;
});

async function captureRoom() {
  if (!mediaStream) { roomBtn.textContent = 'No mic'; return; }
  roomBtn.classList.add('active');
  roomBtn.textContent = 'Clap!';

  const recorder = new MediaRecorder(mediaStream);
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.start();
  await new Promise(r => setTimeout(r, 2000));
  recorder.stop();

  await new Promise(r => { recorder.onstop = r; });

  roomBtn.textContent = 'Room';
  roomBtn.classList.remove('active');

  try {
    const blob = new Blob(chunks, { type: chunks[0].type || 'audio/webm' });
    const arrayBuf = await blob.arrayBuffer();
    const audioBuf = await audioContext.decodeAudioData(arrayBuf);

    // Use the recorded audio as a crude impulse response
    // Normalize it and apply a fade-in to reduce the direct signal
    const irLength = audioBuf.length;
    const irBuffer = audioContext.createBuffer(1, irLength, audioBuf.sampleRate);
    const irData = irBuffer.getChannelData(0);
    const srcData = audioBuf.getChannelData(0);

    // Find the loudest peak (the clap)
    let peakIdx = 0;
    let peakVal = 0;
    for (let i = 0; i < srcData.length; i++) {
      if (Math.abs(srcData[i]) > peakVal) {
        peakVal = Math.abs(srcData[i]);
        peakIdx = i;
      }
    }

    // Copy from just after the peak (the reverb tail)
    const tailStart = Math.min(peakIdx + Math.floor(audioBuf.sampleRate * 0.01), irLength);
    for (let i = tailStart; i < irLength; i++) {
      // Apply exponential decay envelope
      const t = (i - tailStart) / (irLength - tailStart);
      irData[i - tailStart] = srcData[i] * Math.exp(-3 * t) / (peakVal || 1);
    }

    roomConvolver.buffer = irBuffer;
    roomCaptured = true;

    // Reconnect all layer filters through convolver
    currentScene().layers.forEach(l => {
      if (l.filter) {
        try {
          l.filter.disconnect();
          l.filter.connect(roomConvolver);
          l.filter.toDestination();
        } catch(e) {}
      }
    });

    roomBtn.textContent = '\u2713';
    roomBtn.style.borderColor = 'var(--success)';
    roomBtn.style.color = 'var(--success)';
    roomMixSlider.style.display = 'block';
  } catch(e) {
    console.error('Room capture failed:', e);
    roomBtn.textContent = 'Fail';
    roomBtn.style.color = 'var(--danger)';
  }
}

const expandedLayers = new Set(); // kept for compatibility

function renderEditPanel() {

  activeLayerIdx = scene.layers.indexOf(layer);

    if (layer.subOsc) { try { layer.subOsc.dispose(); } catch(e){} }

    if (layer.filter) { try { layer.filter.dispose(); } catch(e){} }

// ===== VISUAL UPDATE LOOP =====
function updateVisuals() {
  requestAnimationFrame(updateVisuals);

  // Pulse wave on beat 1 (big) and beats 2-4 (small tick)
  if (isPlaying && currentStep === 0 && !pulseWave._fired) {
    pulseWave._fired = true;
    pulseWave.classList.remove('animate');
    void pulseWave.offsetWidth;
    pulseWave.classList.add('animate');
  }
  if (currentStep !== 0) pulseWave._fired = false;

  const isQuarter = currentStep === 4 || currentStep === 8 || currentStep === 12;
  if (isPlaying && isQuarter && !pulseTick._fired) {
    pulseTick._fired = true;
    pulseTick.classList.remove('animate');
    void pulseTick.offsetWidth;
    pulseTick.classList.add('animate');
  }
  if (!isQuarter) pulseTick._fired = false;

  // During recording, fill segments when mic picks up sound
  if (appState === 'RECORDING' && recAnalyser && currentStep !== recLastStep) {
    recLastStep = currentStep;
    const buf = new Uint8Array(recAnalyser.frequencyBinCount);
    recAnalyser.getByteTimeDomainData(buf);
    let sum = 0;
    for (let i = 0; i < buf.length; i++) { const v = (buf[i] - 128) / 128; sum += v * v; }
    const rms = Math.sqrt(sum / buf.length);
    if (rms > 0.05) {
      recFilledSteps[currentStep] = true;
    }
  }

  // Step indicator
  stepIndicator.textContent = 'Step: ' + (currentStep + 1) + ' / 16';

  // Update current step highlight on rings (lightweight — just toggle class)
  ringsSvg.querySelectorAll('.seg').forEach(function(seg) {
    seg.classList.remove('current-step');
  });
  ringsSvg.querySelectorAll('.seg[data-step="' + currentStep + '"]').forEach(function(seg) {
    seg.classList.add('current-step');
  });
}
requestAnimationFrame(updateVisuals);

} catch(loadErr) {
  document.querySelector('#overlay p').textContent = 'LOAD ERROR: ' + loadErr.message;
  console.error(loadErr);
}
})();
